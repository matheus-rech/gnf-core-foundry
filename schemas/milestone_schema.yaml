# GNF Milestone Schema
# YAML schema definition for R21/R33 milestone specifications.

$schema_version: "1.0.0"
$schema_type: "milestone_definition"

milestone:
  type: object
  required:
    - milestone_id
    - phase
    - title
    - criteria
  properties:
    milestone_id:
      type: string
      description: "Unique milestone identifier (e.g. 'R21-M1', 'R33-M3')"
    phase:
      type: string
      enum: ["R21", "R33", "pilot", "validation"]
    title:
      type: string
    description:
      type: string
    due_month:
      type: integer
      minimum: 1
    criteria:
      type: array
      minItems: 1
      items:
        $ref: "#/criterion"
    logic:
      type: string
      enum: ["AND", "OR"]
      default: "AND"
    evidence_required:
      type: array
      items:
        type: object
        required: [artifact_type]
        properties:
          artifact_type:
            type: string
            enum:
              - icc_report
              - bland_altman_plot
              - effect_size_table
              - power_analysis
              - adverse_event_log
              - data_quality_report
              - site_comparison_table
          description:
            type: string
          required:
            type: boolean
            default: true
    go_criteria_summary:
      type: string
    no_go_actions:
      type: array
      items:
        type: string

criterion:
  type: object
  required:
    - criterion_id
    - metric
    - operator
    - threshold
  properties:
    criterion_id:
      type: string
    metric:
      type: string
    operator:
      type: string
      enum: ["gt", "gte", "lt", "lte", "eq", "between", "not_null"]
    threshold:
      description: "Scalar threshold or [lower, upper] for 'between'"
    threshold_upper:
      description: "Upper bound for 'between' operator"
    label:
      type: string
    rationale:
      type: string
    weight:
      type: number
      default: 1.0
    critical:
      type: boolean
      default: false
